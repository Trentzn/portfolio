<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureNet Intranet | Employee Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }
        .login-input {
            font-family: var(--font-chrome);
            font-size: 14px;
            padding: 6px 8px;
            background: #fff;
            border-top: 1px solid var(--chrome-shadow);
            border-left: 1px solid var(--chrome-shadow);
            border-right: 1px solid var(--chrome-highlight);
            border-bottom: 1px solid var(--chrome-highlight);
        }
        .login-btn {
            font-family: var(--font-chrome);
            font-size: 14px;
            font-weight: bold;
            padding: 6px 8px;
            background: var(--chrome-face);
            border-top: 1px solid var(--chrome-highlight);
            border-left: 1px solid var(--chrome-highlight);
            border-right: 1px solid var(--chrome-dark-shadow);
            border-bottom: 1px solid var(--chrome-dark-shadow);
            cursor: pointer;
        }
        .login-btn:active {
            border-top: 1px solid var(--chrome-shadow);
            border-left: 1px solid var(--chrome-shadow);
            border-right: 1px solid var(--chrome-highlight);
            border-bottom: 1px solid var(--chrome-highlight);
        }
    </style>
</head>
<body class="ctf-page">
    <div class="win98-window standalone-window">
        <div class="win-titlebar">
            <span class="win-title-text">SECURENET INTRANET — AUTHORIZED PERSONNEL ONLY</span>
        </div>
        <div class="win-body">
            <p>SYSTEM NOTICE: This is a restricted internal system.</p>
            <p>Please enter your employee access key to continue.</p>
            <form class="login-form" id="loginForm">
                <input type="password" id="passwd" class="login-input" placeholder="Access Key" required autocomplete="off">
                <input type="submit" class="login-btn" value="VERIFY">
            </form>
            <p style="margin-top:16px;"><a href="index.html" class="win-link-external">[ Return to Desktop ]</a></p>
        </div>
    </div>
