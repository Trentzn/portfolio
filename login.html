<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault-Tec Verification | LOGIN</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin-top: 20px;
        }
        .login-input {
            background: transparent;
            border: 1px solid var(--fallout-green);
            color: var(--fallout-green);
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            padding: 8px;
            outline: none;
        }
        .login-input:focus {
            box-shadow: 0 0 10px var(--fallout-green);
        }
        .login-btn {
            background: transparent;
            border: 1px solid var(--fallout-green);
            color: var(--fallout-green);
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .login-btn:hover {
            background: var(--fallout-green);
            color: var(--fallout-bg);
            box-shadow: 0 0 15px var(--fallout-green);
        }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="scanlines"></div>
    <div class="terminal-scratches"></div>
    
    <div id="terminal" class="terminal-container">
        <div class="terminal-underlay">
            <div class="layer-dirt"></div>
            <div class="layer-watermark"></div>
        </div>
        <header class="terminal-header">
            <div class="header-left">VAULT-TEC SECURE NET</div>
            <div class="header-right">LOGIN REQUIRED</div>
        </header>

        <main id="content" class="terminal-content">
            <section class="page active">
                <div class="typing-container" style="white-space: pre-wrap; line-height: 1.4; font-size: 1.2rem;">> MISSION LOG: Vault-Tec Personnel Verification Protocol. (CTF Challenge)
> AWAITING PERSONNEL CREDENTIALS...

<form class="login-form" id="loginForm">
    <input type="password" id="passwd" class="login-input" placeholder="Enter Verification Key" required autocomplete="off">
    <input type="submit" class="login-btn" value="VERIFY">
</form>

<br>
[ <a href="index.html" class="ctf-link">RETURN TO MAIN ARCHIVE</a> ]</div>

        </main>
    </div>
